<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>QuickOrder · El Melao de Inés</title>
<meta name="theme-color" content="#0f0f0f">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:#0f0f0f;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100dvh}
.wrap{width:100%;max-width:360px;padding:24px 20px}
.logo{text-align:center;margin-bottom:32px}
.logo img{width:100px;border-radius:14px;margin-bottom:10px}
.logo-name{font-size:24px;font-weight:800}
.logo-sub{font-size:13px;color:#888;margin-top:4px}
.btn{display:flex;align-items:center;gap:14px;width:100%;padding:16px 18px;border-radius:16px;border:none;cursor:pointer;margin-bottom:10px;text-decoration:none;transition:transform .12s}
.btn:active{transform:scale(.97)}
.btn-icon{font-size:24px;flex-shrink:0}
.btn-text{text-align:left}
.btn-label{font-size:16px;font-weight:800;display:block}
.btn-desc{font-size:11px;opacity:.7;margin-top:2px;display:block}
.b-w{background:#c2185b;color:#fff}
.b-k{background:#1e0812;color:#c2185b;border:2px solid #c2185b}
.b-bbq{background:#1e0800;color:#FF6B35;border:2px solid #FF6B35}
.b-b1{background:#001c28;color:#00CFFF;border:2px solid #00CFFF}
.b-b2{background:#1a0040;color:#7c4dff;border:2px solid #7c4dff}
.b-c{background:#1a0028;color:#D946EF;border:2px solid #D946EF}
.b-a{background:#1a1a1a;color:#c2185b;border:2px solid #c2185b}
.footer{text-align:center;font-size:11px;color:#444;margin-top:24px}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <img src="https://i.imgur.com/MqiwJRj.png" alt="El Melao de Inés">
    <div class="logo-name">El Melao de Inés</div>
    <div class="logo-sub">QuickOrder · Sistema de comandas</div>
  </div>
  <a class="btn b-w" id="l-waiter"><span class="btn-icon">🧑‍🍽️</span><span class="btn-text"><span class="btn-label">Camarer@</span><span class="btn-desc">Tomar pedidos y gestionar mesas</span></span></a>
  <a class="btn b-k" id="l-kitchen"><span class="btn-icon">🍳</span><span class="btn-text"><span class="btn-label">Cocina</span><span class="btn-desc">Entrantes, principales, postres</span></span></a>
  <a class="btn b-bbq" id="l-barbacoa"><span class="btn-icon">🔥</span><span class="btn-text"><span class="btn-label">Barbacoa</span><span class="btn-desc">Parrilla y guarniciones</span></span></a>
  <a class="btn b-b1" id="l-bar1"><span class="btn-icon">🍹</span><span class="btn-text"><span class="btn-label">Barra 1</span><span class="btn-desc">Bebidas</span></span></a>
  <a class="btn b-b2" id="l-bar2"><span class="btn-icon">🍹</span><span class="btn-text"><span class="btn-label">Barra 2</span><span class="btn-desc">Bebidas</span></span></a>
  <a class="btn b-c" id="l-cash"><span class="btn-icon">🧾</span><span class="btn-text"><span class="btn-label">Caja</span><span class="btn-desc">Cuentas y cierre de mesas</span></span></a>
  <a class="btn b-a" href="./admin.html"><span class="btn-icon">⚙️</span><span class="btn-text"><span class="btn-label">Admin</span><span class="btn-desc">Editar menú, platos y precios</span></span></a>
  <div class="footer">El Melao de Inés · QuickOrder</div>
</div>
<script>
const BASE=window.location.origin+'/';
const BACKEND='wss://melao-backend-production.up.railway.app';
['waiter','kitchen','barbacoa','bar1','bar2','cash'].forEach(r=>{
  const el=document.getElementById('l-'+r);
  if(el) el.href=`${BASE}?role=${r}&backend=${BACKEND}`;
});
</script>
</body>
</html>
